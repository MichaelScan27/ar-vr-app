<html>
    <head>
        <title>Museum</title>
        <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
        <script src="static/app.js"></script>
    </head>
    <body>
        <a-scene 
            cursor="rayOrigin: mouse; fuse: false" 
            raycaster="objects: .raycastable">

            <a-assets>
                <a-asset-item id="teapot-obj" src="static/utah_teapot.obj"></a-asset-item>
                <a-asset-item id="suzanne-obj" src="static/suzanne.obj"></a-asset-item>
                <a-asset-item id="benchy-obj" src="static/3DBenchy.obj"></a-asset-item>
            </a-assets>

            <a-entity 
                light="color: #FFF; intensity: 1" 
                position="0 10 3">
            </a-entity>

            <a-entity clickable>
                <a-entity id="teapot" class="raycastable clickable" rotation="-90 0 0" position="0 -3 -12" obj-model="obj: #teapot-obj"></a-entity>
                <a-icosahedron id="icosahedron" class="raycastable clickable" rotation="0 45 0" position="7 -1 -8"></a-icosahedron>
                <a-entity id="benchy" class="raycastable clickable" scale="0.1 0.1 0.1" rotation="270 90 0" position="12 -2 0" obj-model="obj: #benchy-obj"></a-entity> 
                <a-dodecahedron id="dodecahedron" class="raycastable clickable" rotation="0 45 0" position="7 -1 8"></a-dodecahedron>
                <a-torus id="torus" class="raycastable clickable" rotation="0 0 0" position="0 -1 12"></a-torus>
                <a-tetrahedron id="tetrahedron" class="raycastable clickable" rotation="0 45 0" position="-7 -1 8"></a-tetrahedron>
                <a-sphere id="sphere" class="raycastable clickable" rotation="0 0 0" position="-12 -1 0"></a-sphere>
                <a-entity id="suzanne" class="raycastable clickable" rotation="-45 45 0" position="-7 -2 -8" obj-model="obj: #suzanne-obj"></a-entity>

                <a-entity id="background" >
                    <a-box 
                        class="raycastable" 
                        position="0 -5 -12" 
                        color="tomato" 
                        depth="4" height="4" width="4">
                    </a-box>
                     <a-box 
                        class="raycastable" 
                        position="7 -5 -8" 
                        rotation="0 45 0"
                        color="tomato" 
                        depth="4" height="4" width="4">
                    </a-box>
                    <a-box 
                        class="raycastable" 
                        position="12 -5 0" 
                        color="tomato" 
                        depth="4" height="4" width="4">
                    </a-box>
                    <a-box 
                        class="raycastable" 
                        position="7 -5 8"
                        rotation="0 45 0" 
                        color="tomato" 
                        depth="4" height="4" width="4">
                    </a-box>
                    <a-box 
                        class="raycastable" 
                        position="0 -5 12" 
                        color="tomato" 
                        depth="4" height="4" width="4">
                    </a-box>
                    <a-box 
                        class="raycastable" 
                        position="-7 -5 8" 
                        rotation="0 45 0"
                        color="tomato" 
                        depth="4" height="4" width="4">
                    </a-box>
                    <a-box 
                        class="raycastable" 
                        position="-12 -5 0" 
                        color="tomato" 
                        depth="4" height="4" width="4">
                    </a-box>
                    <a-box 
                        class="raycastable" 
                        position="-7 -5 -8" 
                        rotation="0 45 0"
                        color="tomato" 
                        depth="4" height="4" width="4">
                    </a-box>
                    
                    <a-plane 
                        class="raycastable" 
                        position="0 -5 -15" 
                        rotation="-90 0 0" 
                        width="100" 
                        height="100" 
                        color="green">
                    </a-plane>

                    <a-sky 
                        class="raycastable"
                        color="#ebbeFF">
                    </a-sky>
                </a-entity>
                
                <a-entity camera look-controls wasd-controls position="0 1.6 0">
                    <a-entity
                        id="information"
                        position="0 0.5 -1.5"
                        visible="false"
                        geometry="primitive: plane; width: 1.5; height: 0.35"
                        material="color: #333333; shader: flat; transparent: false">
                        <a-entity id="shapeName"
                            position="-0.68 0.05 0"
                            text="anchor: left; width: 1.5"></a-entity>
                        <a-entity id="shapeDescription"
                            position="-0.68 -0.05 0"
                            text="anchor: left"></a-entity>
                    </a-entity>
                </a-entity>
                
            </a-entity>

            
        </a-scene>
    </body>
</html>
